<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <style>
    .node { fill:#eef2ff; stroke:#1d4ed8; stroke-width:2; rx:16; ry:16; }
    .label { font: 16px 'Segoe UI', Arial, sans-serif; fill:#0f172a; }
    .small { font: 14px 'Segoe UI', Arial, sans-serif; fill:#334155; }
    .arrow { fill:none; stroke:#2563eb; stroke-width:3; marker-end:url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="12" markerHeight="10" refX="12" refY="5" orient="auto">
      <polygon points="0 0, 12 5, 0 10" fill="#2563eb" />
    </marker>
  </defs>

  <rect class="node" x="40" y="210" width="240" height="90" rx="18" ry="18" />
  <text class="label" x="160" y="245" text-anchor="middle">Teacher / Admin</text>
  <text class="small" x="160" y="270" text-anchor="middle">Dashboard UI</text>

  <rect class="node" x="300" y="60" width="260" height="90" rx="18" ry="18" />
  <text class="label" x="430" y="100" text-anchor="middle">Supabase</text>
  <text class="small" x="430" y="125" text-anchor="middle">Client + Auth</text>

  <rect class="node" x="300" y="280" width="260" height="90" rx="18" ry="18" />
  <text class="label" x="430" y="320" text-anchor="middle">Server Functions</text>
  <text class="small" x="430" y="345" text-anchor="middle">Secure AI + APIs</text>

  <rect class="node" x="620" y="80" width="240" height="90" rx="18" ry="18" />
  <text class="label" x="740" y="120" text-anchor="middle">Supabase</text>
  <text class="small" x="740" y="145" text-anchor="middle">Database</text>

  <rect class="node" x="620" y="240" width="240" height="90" rx="18" ry="18" />
  <text class="label" x="740" y="280" text-anchor="middle">Supabase</text>
  <text class="small" x="740" y="305" text-anchor="middle">Service Role</text>

  <rect class="node" x="620" y="380" width="240" height="90" rx="18" ry="18" />
  <text class="label" x="740" y="420" text-anchor="middle">AI + APIs</text>
  <text class="small" x="740" y="445" text-anchor="middle">Gemini + YouTube</text>

  <path class="arrow" d="M280 255 L300 255" />
  <path class="arrow" d="M260 240 L300 240" />
  <path class="arrow" d="M310 340 L620 340" />
  <path class="arrow" d="M430 370 L430 380 L620 380" />
  <path class="arrow" d="M550 315 L620 315" />
  <path class="arrow" d="M460 95 L620 95" />
  <path class="arrow" d="M620 145 L460 145 L460 245" />

  <text class="small" x="325" y="240" text-anchor="start">Calls</text>
  <text class="small" x="505" y="360" text-anchor="end">AI Requests</text>
  <text class="small" x="635" y="165" text-anchor="start">Stores data</text>
  <text class="small" x="635" y="425" text-anchor="start">Transcript/AI</text>
