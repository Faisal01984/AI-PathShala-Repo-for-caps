<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560">
  <style>
    .node { fill:#f8fafc; stroke:#2563eb; stroke-width:2; rx:20; ry:20; }
    .title { font: 18px 'Segoe UI', Arial, sans-serif; fill:#0f172a; font-weight:700; }
    .subtitle { font: 14px 'Segoe UI', Arial, sans-serif; fill:#334155; }
    .arrow { fill:none; stroke:#2563eb; stroke-width:3; marker-end:url(#arrowhead); }
    .label { font: 13px 'Segoe UI', Arial, sans-serif; fill:#1e293b; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="12" markerHeight="10" refX="12" refY="5" orient="auto">
      <polygon points="0 0, 12 5, 0 10" fill="#2563eb" />
    </marker>
  </defs>

  <rect class="node" x="80" y="60" width="280" height="120" />
  <text class="title" x="220" y="95" text-anchor="middle">Teacher / Admin</text>
  <text class="subtitle" x="220" y="122" text-anchor="middle">Dashboard UI</text>
  <text class="subtitle" x="220" y="148" text-anchor="middle">Lesson creation, review, export</text>

  <rect class="node" x="360" y="60" width="260" height="120" />
  <text class="title" x="490" y="95" text-anchor="middle">Supabase Client</text>
  <text class="subtitle" x="490" y="122" text-anchor="middle">Authentication + user data</text>
  <text class="subtitle" x="490" y="148" text-anchor="middle">Real-time queries</text>

  <rect class="node" x="640" y="60" width="260" height="120" />
  <text class="title" x="770" y="95" text-anchor="middle">Supabase Database</text>
  <text class="subtitle" x="770" y="122" text-anchor="middle">Lessons, users, progress</text>

  <rect class="node" x="220" y="240" width="280" height="120" />
  <text class="title" x="360" y="275" text-anchor="middle">Server Functions</text>
  <text class="subtitle" x="360" y="302" text-anchor="middle">Secure backend logic</text>
  <text class="subtitle" x="360" y="328" text-anchor="middle">AI orchestration + Supabase admin calls</text>

  <rect class="node" x="560" y="260" width="260" height="120" />
  <text class="title" x="690" y="295" text-anchor="middle">AI & External APIs</text>
  <text class="subtitle" x="690" y="322" text-anchor="middle">Gemini / Lovable + YouTube</text>
  <text class="subtitle" x="690" y="348" text-anchor="middle">Transcript extraction + lesson generation</text>

  <rect class="node" x="220" y="430" width="280" height="100" />
  <text class="title" x="360" y="465" text-anchor="middle">Service Role</text>
  <text class="subtitle" x="360" y="492" text-anchor="middle">Supabase admin access</text>

  <path class="arrow" d="M320 180 L360 180" />
  <text class="label" x="340" y="170" text-anchor="middle">Auth / Data</text>

  <path class="arrow" d="M190 180 L190 240 L220 240" />
  <text class="label" x="160" y="210" text-anchor="middle">UI calls</text>

  <path class="arrow" d="M500 180 L500 240" />
  <text class="label" x="520" y="210" text-anchor="start">Data sync</text>

  <path class="arrow" d="M500 360 L560 360" />
  <text class="label" x="530" y="350" text-anchor="middle">AI requests</text>

  <path class="arrow" d="M500 360 L500 430 L360 430" />
  <text class="label" x="470" y="410" text-anchor="middle">Admin access</text>

  <path class="arrow" d="M720 180 L720 240 L560 240" />
  <text class="label" x="780" y="210" text-anchor="middle">Read / write</text>

  <path class="arrow" d="M640 140 L640 220" />
  <text class="label" x="660" y="180" text-anchor="start">Sync user data</text>
</svg>
